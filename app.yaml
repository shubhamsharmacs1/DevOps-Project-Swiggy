apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: swiggy-app
spec:
  project: default

  source:
    repoURL: https://github.com/shubhamsharmacs1/DevOps-Project-Swiggy.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
